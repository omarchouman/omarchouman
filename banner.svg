<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Blue glow for name -->
    <filter id="nameGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.22  0 0 0 0 0.56  0 0 0 0 1  0 0 0 0.9 0"
        result="blueGlow"/>
      <feMerge>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Left accent line: fades at top + bottom -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e90ff" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#1e90ff" stop-opacity="1"/>
      <stop offset="82%"  stop-color="#1e90ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1e90ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Separator line: fades right -->
    <linearGradient id="sepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#58a6ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft spotlight behind text -->
    <radialGradient id="spotlight" cx="28%" cy="50%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d2040" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1.5" fill="#3a6b9e" opacity="0.55"/>
    </pattern>

    <!-- Typing reveal clip -->
    <clipPath id="typeClip">
      <rect x="100" y="325" height="60" width="0">
        <animate attributeName="width" from="0" to="690" dur="3.5s"
                 fill="freeze" begin="1s" calcMode="linear"/>
      </rect>
    </clipPath>

  </defs>

  <!-- ── BACKGROUND ─────────────────────────────────────── -->
  <rect width="1500" height="500" fill="#0d1117"/>

  <!-- Dot grid, slow pulse -->
  <rect width="1500" height="500" fill="url(#dots)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="8s" repeatCount="indefinite"/>
  </rect>
  <!-- Second dot layer, offset phase for shimmer -->
  <rect x="24" y="24" width="1500" height="500" fill="url(#dots)" opacity="0">
    <animate attributeName="opacity" values="0;0.45;0" dur="8s" begin="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Soft spotlight -->
  <rect width="1500" height="500" fill="url(#spotlight)"/>

  <!-- ── DECORATIVE WATERMARK ───────────────────────────── -->
  <text x="1100" y="470" font-size="370" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-weight="bold"
        fill="#1a3a5c" opacity="0.22">&lt;/&gt;</text>

  <!-- ── LEFT ACCENT LINE ───────────────────────────────── -->
  <rect x="0" y="0" width="4" height="500" fill="url(#lineGrad)"/>

  <!-- Pulsing nodes on line -->
  <circle cx="2" cy="130" r="4" fill="#1e90ff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="3;5;3"     dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="2" cy="370" r="4" fill="#1e90ff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="3;5;3"     dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- ── TEXT CONTENT ───────────────────────────────────── -->

  <!-- Name -->
  <text x="100" y="218"
        font-family="'Courier New', Courier, monospace" font-size="72" font-weight="bold"
        fill="#ffffff" filter="url(#nameGlow)">&lt; Omar Chouman /&gt;</text>

  <!-- Title -->
  <text x="100" y="276"
        font-family="Verdana, Geneva, Tahoma, sans-serif" font-size="30"
        fill="#58a6ff" letter-spacing="2.5">Full-Stack Web Developer</text>

  <!-- Separator -->
  <rect x="100" y="298" width="520" height="2" fill="url(#sepGrad)"/>

  <!-- Tagline (typing reveal) -->
  <text x="100" y="370"
        font-family="'Courier New', Courier, monospace" font-size="24"
        fill="#8b949e" clip-path="url(#typeClip)">Building Scalable Systems, One Line at a Time.</text>

  <!-- Cursor: moves with typing, then blinks -->
  <rect x="100" y="347" width="2" height="30" fill="#58a6ff">
    <animate attributeName="x" from="100" to="762" dur="3.5s"
             fill="freeze" begin="1s" calcMode="linear"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.9s"
             begin="4.5s" repeatCount="indefinite"/>
  </rect>

</svg>
